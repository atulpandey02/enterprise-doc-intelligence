version: '3.8'

# ── Shared Airflow config ──────────────────────────────────────────────────────
x-airflow-common:
  &airflow-common
  build:
    context: .
    dockerfile: Dockerfile   # ← uses our custom image with all deps installed
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR:                    LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN:        postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY:                  ''
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES:               'false'
    AIRFLOW__LOGGING__LOGGING_LEVEL:            INFO

    # ── Your API keys ──────────────────────────────────────────────────────────
    # These are read from your .env file automatically by docker-compose
    PINECONE_API_KEY:    ${PINECONE_API_KEY}
    PINECONE_INDEX_NAME: ${PINECONE_INDEX_NAME:-doc-intelligence}
    GROQ_API_KEY:        ${GROQ_API_KEY}

    # ── Paths inside the container ─────────────────────────────────────────────
    # documents/ on your Mac → /opt/airflow/documents inside Docker
    DOCUMENTS_FOLDER: /opt/airflow/documents
    HASH_STORE_PATH:  /opt/airflow/hash_store.json

  volumes:
    # DAG files — Airflow reads these directly
    - ./src/airflow/dags:/opt/airflow/dags

    # Documents folder — shared between Mac and container
    # Drop files on Mac → container sees them instantly
    - ./documents:/opt/airflow/documents

    # Hash store — persists between container restarts
    - ./hash_store.json:/opt/airflow/hash_store.json

    # Airflow logs
    - airflow-logs:/opt/airflow/logs

  depends_on:
    postgres:
      condition: service_healthy

services:

  # ── Postgres — Airflow metadata database ──────────────────────────────────
  postgres:
    image: postgres:13
    environment:
      POSTGRES_USER:     airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB:       airflow
    volumes:
      - postgres-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Airflow init — runs once to set up DB and create admin user ────────────
  airflow-init:
    <<: *airflow-common
    command: bash -c "airflow db init && airflow users create --username airflow --password airflow --firstname Atul --lastname Pandey --role Admin --email admin@example.com && echo 'Airflow initialised successfully'"
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_UPGRADE: 'true'

  # ── Airflow webserver — the UI at localhost:8080 ───────────────────────────
  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 10s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # ── Airflow scheduler — actually runs the DAGs ────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    restart: unless-stopped

volumes:
  postgres-db:
  airflow-logs: